<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Work Blueprint — Loading Screen: The Sacred Pulse v2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #050507;
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.loading-screen {
  position: fixed;
  inset: 0;
  background: #050507;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ============================================================
   DEEP BACKGROUND LAYERS — stacked radials for cosmic depth
   ============================================================ */
.bg-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* Core warm nebula */
.bg-nebula {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 900px;
  height: 900px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(196,112,63,0.12) 0%,
    rgba(196,112,63,0.05) 25%,
    rgba(140,70,30,0.03) 45%,
    rgba(80,30,10,0.015) 65%,
    transparent 80%
  );
  animation: nebulaPulse 3.2s ease-in-out infinite;
}
@keyframes nebulaPulse {
  0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
  15% { transform: translate(-50%,-50%) scale(1.06); opacity: 1; }
  25% { transform: translate(-50%,-50%) scale(1.02); opacity: 0.9; }
  35% { transform: translate(-50%,-50%) scale(1.05); opacity: 0.95; }
  50% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
}

/* Secondary cool halo for contrast */
.bg-halo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 1100px;
  height: 1100px;
  border-radius: 50%;
  background: radial-gradient(circle,
    transparent 30%,
    rgba(196,112,63,0.015) 50%,
    rgba(100,60,30,0.008) 70%,
    transparent 90%
  );
  animation: haloRotate 120s linear infinite;
}
@keyframes haloRotate { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* Film grain for texture */
.bg-grain {
  position: absolute;
  inset: -50%;
  width: 200%;
  height: 200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
  animation: grainShift 0.5s steps(4) infinite;
}
@keyframes grainShift {
  0% { transform: translate(0, 0); }
  25% { transform: translate(-5%, -5%); }
  50% { transform: translate(5%, 0); }
  75% { transform: translate(0, 5%); }
  100% { transform: translate(0, 0); }
}

/* ============================================================
   PARTICLE FIELD — more particles, brighter, varied sizes
   ============================================================ */
.particles { position: absolute; inset: 0; pointer-events: none; }
.particle {
  position: absolute;
  background: #C4703F;
  border-radius: 50%;
  opacity: 0;
}
/* Small particles */
.particle.s { width: 1.5px; height: 1.5px; }
/* Medium particles */
.particle.m { width: 3px; height: 3px; box-shadow: 0 0 6px rgba(196,112,63,0.5); }
/* Large particles */
.particle.l { width: 4px; height: 4px; box-shadow: 0 0 12px rgba(196,112,63,0.6), 0 0 24px rgba(196,112,63,0.2); }

.particle.p1  { left: 8%;  top: 75%; animation: pFloat 8s ease-in-out infinite 0s; }
.particle.p2  { left: 15%; top: 68%; animation: pFloat 10s ease-in-out infinite 1.2s; }
.particle.p3  { left: 25%; top: 80%; animation: pFloat 7s ease-in-out infinite 2.8s; }
.particle.p4  { left: 35%; top: 72%; animation: pFloat 9s ease-in-out infinite 0.6s; }
.particle.p5  { left: 45%; top: 78%; animation: pFloat 11s ease-in-out infinite 3.5s; }
.particle.p6  { left: 55%; top: 65%; animation: pFloat 8.5s ease-in-out infinite 1.8s; }
.particle.p7  { left: 65%; top: 74%; animation: pFloat 10s ease-in-out infinite 4.2s; }
.particle.p8  { left: 75%; top: 70%; animation: pFloat 9s ease-in-out infinite 2.1s; }
.particle.p9  { left: 85%; top: 76%; animation: pFloat 7.5s ease-in-out infinite 5s; }
.particle.p10 { left: 20%; top: 85%; animation: pFloat 12s ease-in-out infinite 0.3s; }
.particle.p11 { left: 40%; top: 60%; animation: pFloat 9s ease-in-out infinite 3.8s; }
.particle.p12 { left: 60%; top: 82%; animation: pFloat 11s ease-in-out infinite 1.5s; }
.particle.p13 { left: 80%; top: 63%; animation: pFloat 8s ease-in-out infinite 4.5s; }
.particle.p14 { left: 50%; top: 88%; animation: pFloat 10s ease-in-out infinite 2.5s; }
.particle.p15 { left: 30%; top: 55%; animation: pFloat 13s ease-in-out infinite 0.8s; }
.particle.p16 { left: 70%; top: 58%; animation: pFloat 9.5s ease-in-out infinite 3.2s; }
.particle.p17 { left: 10%; top: 60%; animation: pFloat 11s ease-in-out infinite 5.5s; }
.particle.p18 { left: 90%; top: 70%; animation: pFloat 8s ease-in-out infinite 1s; }

@keyframes pFloat {
  0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  6%   { opacity: 0.7; }
  30%  { opacity: 0.4; transform: translateY(-80px) translateX(15px) scale(1.2); }
  60%  { opacity: 0.15; }
  100% { transform: translateY(-280px) translateX(40px) scale(0.6); opacity: 0; }
}

/* ============================================================
   SACRED GEOMETRY — layered, high contrast
   ============================================================ */
.geometry-container {
  position: relative;
  width: 400px;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Outer mandala ring (new) */
.mandala-ring {
  position: absolute;
  width: 380px;
  height: 380px;
  animation: mandalaSpin 90s linear infinite;
  opacity: 0.12;
}
.mandala-ring svg { width: 100%; height: 100%; }
.mandala-ring circle, .mandala-ring line { stroke: #C4703F; fill: none; }
@keyframes mandalaSpin { to { transform: rotate(360deg); } }

/* Flower of Life — brighter, with glow */
.flower-of-life {
  position: absolute;
  width: 320px;
  height: 320px;
  animation: flowerSpin 70s linear infinite, flowerBreathe 3.2s ease-in-out infinite;
  opacity: 0.15;
  filter: drop-shadow(0 0 2px rgba(196,112,63,0.3));
}
.flower-of-life circle {
  fill: none;
  stroke: #C4703F;
  stroke-width: 0.5;
}
@keyframes flowerSpin { to { transform: rotate(360deg); } }
@keyframes flowerBreathe {
  0%, 100% { opacity: 0.12; transform: rotate(0deg) scale(1); }
  15% { opacity: 0.22; transform: rotate(0.5deg) scale(1.03); }
  35% { opacity: 0.18; }
  50% { opacity: 0.12; transform: rotate(0deg) scale(1); }
}

/* Concentric sacred rings — higher opacity, varied styles */
.sacred-ring {
  position: absolute;
  border-radius: 50%;
}
.sacred-ring.r1 {
  width: 340px; height: 340px;
  border: 1px solid rgba(196,112,63,0.12);
  animation: ringSpin 45s linear infinite;
}
.sacred-ring.r2 {
  width: 280px; height: 280px;
  border: 1px dashed rgba(196,112,63,0.08);
  animation: ringSpin 35s linear infinite reverse;
}
.sacred-ring.r3 {
  width: 220px; height: 220px;
  border: 1px solid rgba(196,112,63,0.15);
  animation: ringSpin 55s linear infinite;
  box-shadow: 0 0 30px rgba(196,112,63,0.03) inset;
}
.sacred-ring.r4 {
  width: 160px; height: 160px;
  border: 1px dotted rgba(196,112,63,0.1);
  animation: ringSpin 25s linear infinite reverse;
}
.sacred-ring.r5 {
  width: 110px; height: 110px;
  border: 1px solid rgba(196,112,63,0.2);
  animation: ringSpin 20s linear infinite;
  box-shadow: 0 0 20px rgba(196,112,63,0.05) inset, 0 0 40px rgba(196,112,63,0.02);
}
@keyframes ringSpin { to { transform: rotate(360deg); } }

/* Hexagonal system — higher contrast, glowing borders */
.hex-ring {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hex-shape {
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  animation: hexBreathe 3.2s ease-in-out infinite;
}
.hex-shape.h1 {
  width: 230px; height: 230px;
  border: 1.5px solid rgba(196,112,63,0.14);
  animation: hexSpin1 30s linear infinite, hexBreathe 3.2s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(196,112,63,0.05) inset;
}
.hex-shape.h2 {
  width: 170px; height: 170px;
  border: 1.5px solid rgba(196,112,63,0.1);
  animation: hexSpin2 22s linear infinite reverse, hexBreathe 3.2s ease-in-out infinite 0.4s;
}
.hex-shape.h3 {
  width: 115px; height: 115px;
  border: 1.5px solid rgba(196,112,63,0.2);
  animation: hexSpin3 16s linear infinite, hexBreathe 3.2s ease-in-out infinite 0.8s;
  box-shadow: 0 0 15px rgba(196,112,63,0.06) inset;
}
@keyframes hexSpin1 { to { transform: rotate(360deg); } }
@keyframes hexSpin2 { to { transform: rotate(360deg); } }
@keyframes hexSpin3 { to { transform: rotate(360deg); } }
@keyframes hexBreathe {
  0%, 100% { opacity: 0.7; }
  15% { opacity: 1; }
  35% { opacity: 0.85; }
  50% { opacity: 0.7; }
}

/* Golden ratio spiral (new layer) */
.golden-spiral {
  position: absolute;
  width: 300px;
  height: 300px;
  animation: spiralSpin 100s linear infinite reverse;
  opacity: 0.06;
}
.golden-spiral svg { width: 100%; height: 100%; }
@keyframes spiralSpin { to { transform: rotate(360deg); } }

/* ============================================================
   THE HEART — dramatic glow, deep pulse
   ============================================================ */
.heart-core {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Multi-layered glow */
.heart-glow-outer {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(196,112,63,0.15) 0%,
    rgba(196,112,63,0.05) 40%,
    transparent 70%
  );
  animation: heartGlowOuter 3.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes heartGlowOuter {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  15% { transform: scale(1.5); opacity: 0.8; }
  25% { transform: scale(1.2); opacity: 0.5; }
  35% { transform: scale(1.4); opacity: 0.7; }
  50% { transform: scale(1); opacity: 0.4; }
}

.heart-glow-inner {
  position: absolute;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(196,112,63,0.35) 0%,
    rgba(196,112,63,0.15) 35%,
    transparent 65%
  );
  animation: heartGlowInner 3.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes heartGlowInner {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  15% { transform: scale(1.3); opacity: 1; }
  25% { transform: scale(1.1); opacity: 0.75; }
  35% { transform: scale(1.25); opacity: 0.95; }
  50% { transform: scale(1); opacity: 0.6; }
}

/* Pulse ripples — 3 layers, staggered */
.heart-ripple {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(196,112,63,0.25);
  width: 60px;
  height: 60px;
  animation: rippleExpand 3.2s ease-out infinite;
}
.heart-ripple.rip2 {
  animation-delay: 0.25s;
  border-color: rgba(196,112,63,0.15);
}
.heart-ripple.rip3 {
  animation-delay: 0.5s;
  border-color: rgba(196,112,63,0.08);
  width: 50px;
  height: 50px;
}
@keyframes rippleExpand {
  0% { transform: scale(1); opacity: 0.7; }
  15% { transform: scale(2); opacity: 0.35; }
  35% { transform: scale(3); opacity: 0.08; }
  60% { transform: scale(3.5); opacity: 0; }
  100% { transform: scale(3.5); opacity: 0; }
}

/* The heart itself — larger, more dramatic */
.heart-icon {
  position: relative;
  z-index: 3;
  animation: heartBeat 3.2s ease-in-out infinite;
  filter:
    drop-shadow(0 0 15px rgba(196,112,63,0.7))
    drop-shadow(0 0 35px rgba(196,112,63,0.35))
    drop-shadow(0 0 60px rgba(196,112,63,0.15));
}
.heart-icon svg {
  width: 56px;
  height: 56px;
}
@keyframes heartBeat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.2); }
  25% { transform: scale(1.06); }
  35% { transform: scale(1.16); }
  50% { transform: scale(1); }
}

/* ============================================================
   TEXT + PROGRESS — high contrast, luminous
   ============================================================ */
.loading-text {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-top: 60px;
}

.loading-message {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 22px;
  color: rgba(255,255,255,0.92);
  max-width: 420px;
  line-height: 1.55;
  min-height: 64px;
  transition: opacity 0.5s ease;
  text-shadow: 0 0 40px rgba(196,112,63,0.15);
}

.loading-stage-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 28px;
}
.loading-stage {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(196,112,63,0.7);
}

/* Progress bar — glowing segments */
.loading-progress {
  display: flex;
  gap: 5px;
  margin-top: 18px;
  justify-content: center;
}
.progress-segment {
  width: 48px;
  height: 3px;
  background: rgba(196,112,63,0.08);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.progress-segment.active { background: rgba(196,112,63,0.12); }
.progress-segment.active .progress-fill { display: block; }
.progress-fill {
  display: none;
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, #C4703F, #D4884F);
  border-radius: 3px;
  animation: segmentPulse 3.2s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(196,112,63,0.6), 0 0 20px rgba(196,112,63,0.2);
}
.progress-segment.complete .progress-fill {
  display: block;
  animation: none;
  opacity: 0.7;
  box-shadow: 0 0 6px rgba(196,112,63,0.3);
}
@keyframes segmentPulse {
  0%, 100% { opacity: 0.4; transform: scaleX(0.5); transform-origin: left; }
  15% { opacity: 1; transform: scaleX(1); }
  50% { opacity: 0.5; transform: scaleX(0.7); }
}

.loading-timer {
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  margin-top: 22px;
  font-weight: 400;
  letter-spacing: 0.04em;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 480px) {
  .geometry-container { width: 300px; height: 300px; }
  .flower-of-life { width: 240px; height: 240px; }
  .mandala-ring { width: 280px; height: 280px; }
  .golden-spiral { width: 220px; height: 220px; }
  .hex-shape.h1 { width: 180px; height: 180px; }
  .hex-shape.h2 { width: 130px; height: 130px; }
  .hex-shape.h3 { width: 90px; height: 90px; }
  .sacred-ring.r1 { width: 260px; height: 260px; }
  .sacred-ring.r2 { width: 210px; height: 210px; }
  .sacred-ring.r3 { width: 170px; height: 170px; }
  .sacred-ring.r4 { width: 130px; height: 130px; }
  .sacred-ring.r5 { width: 90px; height: 90px; }
  .heart-icon svg { width: 44px; height: 44px; }
  .loading-message { font-size: 18px; max-width: 300px; }
  .loading-text { margin-top: 40px; }
  .bg-nebula { width: 600px; height: 600px; }
}
</style>
</head>
<body>

<div class="loading-screen">

  <!-- Deep background layers -->
  <div class="bg-layer">
    <div class="bg-halo"></div>
    <div class="bg-nebula"></div>
    <div class="bg-grain"></div>
  </div>

  <!-- Particle field -->
  <div class="particles">
    <div class="particle s p1"></div>
    <div class="particle m p2"></div>
    <div class="particle s p3"></div>
    <div class="particle l p4"></div>
    <div class="particle s p5"></div>
    <div class="particle m p6"></div>
    <div class="particle s p7"></div>
    <div class="particle m p8"></div>
    <div class="particle l p9"></div>
    <div class="particle s p10"></div>
    <div class="particle m p11"></div>
    <div class="particle s p12"></div>
    <div class="particle m p13"></div>
    <div class="particle l p14"></div>
    <div class="particle s p15"></div>
    <div class="particle m p16"></div>
    <div class="particle s p17"></div>
    <div class="particle m p18"></div>
  </div>

  <!-- Sacred geometry system -->
  <div class="geometry-container">

    <!-- Outer mandala (12-point star pattern) -->
    <svg class="mandala-ring" viewBox="0 0 400 400">
      <circle cx="200" cy="200" r="185" stroke-width="0.5"/>
      <circle cx="200" cy="200" r="175" stroke-width="0.3" stroke-dasharray="4 8"/>
      <!-- 12 radial lines -->
      <line x1="200" y1="15" x2="200" y2="385" stroke-width="0.3"/>
      <line x1="15" y1="200" x2="385" y2="200" stroke-width="0.3"/>
      <line x1="64" y1="64" x2="336" y2="336" stroke-width="0.3"/>
      <line x1="336" y1="64" x2="64" y2="336" stroke-width="0.3"/>
      <line x1="104" y1="18" x2="296" y2="382" stroke-width="0.2"/>
      <line x1="296" y1="18" x2="104" y2="382" stroke-width="0.2"/>
      <line x1="18" y1="104" x2="382" y2="296" stroke-width="0.2"/>
      <line x1="18" y1="296" x2="382" y2="104" stroke-width="0.2"/>
      <!-- Node circles at intersections -->
      <circle cx="200" cy="15" r="2" fill="rgba(196,112,63,0.3)" stroke="none"/>
      <circle cx="200" cy="385" r="2" fill="rgba(196,112,63,0.3)" stroke="none"/>
      <circle cx="15" cy="200" r="2" fill="rgba(196,112,63,0.3)" stroke="none"/>
      <circle cx="385" cy="200" r="2" fill="rgba(196,112,63,0.3)" stroke="none"/>
      <circle cx="64" cy="64" r="2" fill="rgba(196,112,63,0.2)" stroke="none"/>
      <circle cx="336" cy="336" r="2" fill="rgba(196,112,63,0.2)" stroke="none"/>
      <circle cx="336" cy="64" r="2" fill="rgba(196,112,63,0.2)" stroke="none"/>
      <circle cx="64" cy="336" r="2" fill="rgba(196,112,63,0.2)" stroke="none"/>
    </svg>

    <!-- Flower of Life -->
    <svg class="flower-of-life" viewBox="0 0 300 300">
      <circle cx="150" cy="150" r="50"/>
      <circle cx="150" cy="100" r="50"/>
      <circle cx="193.3" cy="125" r="50"/>
      <circle cx="193.3" cy="175" r="50"/>
      <circle cx="150" cy="200" r="50"/>
      <circle cx="106.7" cy="175" r="50"/>
      <circle cx="106.7" cy="125" r="50"/>
      <circle cx="150" cy="50" r="50"/>
      <circle cx="193.3" cy="75" r="50"/>
      <circle cx="236.6" cy="100" r="50"/>
      <circle cx="236.6" cy="150" r="50"/>
      <circle cx="236.6" cy="200" r="50"/>
      <circle cx="193.3" cy="225" r="50"/>
      <circle cx="150" cy="250" r="50"/>
      <circle cx="106.7" cy="225" r="50"/>
      <circle cx="63.4" cy="200" r="50"/>
      <circle cx="63.4" cy="150" r="50"/>
      <circle cx="63.4" cy="100" r="50"/>
      <circle cx="106.7" cy="75" r="50"/>
    </svg>

    <!-- Golden ratio spiral -->
    <svg class="golden-spiral" viewBox="0 0 300 300">
      <path d="M150,150 Q150,80 210,80 Q280,80 280,150 Q280,240 190,240 Q90,240 90,140 Q90,30 200,30" fill="none" stroke="#C4703F" stroke-width="0.6"/>
      <path d="M150,150 Q150,110 180,110 Q220,110 220,150 Q220,200 170,200 Q110,200 110,145 Q110,70 185,70" fill="none" stroke="#C4703F" stroke-width="0.4"/>
    </svg>

    <!-- Concentric sacred rings -->
    <div class="sacred-ring r1"></div>
    <div class="sacred-ring r2"></div>
    <div class="sacred-ring r3"></div>
    <div class="sacred-ring r4"></div>
    <div class="sacred-ring r5"></div>

    <!-- Hexagonal Metatron system -->
    <div class="hex-ring"><div class="hex-shape h1"></div></div>
    <div class="hex-ring"><div class="hex-shape h2"></div></div>
    <div class="hex-ring"><div class="hex-shape h3"></div></div>

    <!-- Heart at center -->
    <div class="heart-core">
      <div class="heart-glow-outer"></div>
      <div class="heart-glow-inner"></div>
      <div class="heart-ripple"></div>
      <div class="heart-ripple rip2"></div>
      <div class="heart-ripple rip3"></div>
      <div class="heart-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <defs>
            <radialGradient id="heartGrad" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#E8955A"/>
              <stop offset="100%" stop-color="#C4703F"/>
            </radialGradient>
          </defs>
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#heartGrad)"/>
        </svg>
      </div>
    </div>

  </div>

  <!-- Text + Progress -->
  <div class="loading-text">
    <div class="loading-message" id="loadingMsg">Brewing something strong for your brand...</div>
    <div class="loading-stage-row">
      <div class="loading-stage" id="loadingStage">Step 1 of 4</div>
    </div>
    <div class="loading-progress">
      <div class="progress-segment active" id="seg1"><div class="progress-fill"></div></div>
      <div class="progress-segment" id="seg2"><div class="progress-fill"></div></div>
      <div class="progress-segment" id="seg3"><div class="progress-fill"></div></div>
      <div class="progress-segment" id="seg4"><div class="progress-fill"></div></div>
    </div>
    <div class="loading-timer" id="loadingTimer">This typically takes 2 to 4 minutes</div>
  </div>

</div>

<script>
const MESSAGES = [
  "Brewing something strong for your brand...",
  "Reading between your lines...",
  "Sharpening the questions that matter...",
  "Finding the words you did not know you needed...",
  "Tuning the frequency to your specific flavor of genius...",
  "Your brand is already forming. We just need to pull it out...",
  "Calibrating for depth. Shallow is for swimming pools...",
  "Loading 10,000 hours of brand strategy into 90 minutes...",
  "Assembling the interview that will change how you see your business...",
  "Almost there. The good stuff takes a second...",
];

const STAGES = [
  { label: "Step 1 of 4 — Synthesizing", seg: 1 },
  { label: "Step 2 of 4 — Generating brand images", seg: 2 },
  { label: "Step 3 of 4 — Writing your story", seg: 3 },
  { label: "Step 4 of 4 — Final polish", seg: 4 },
];

const shuffled = [...MESSAGES].sort(() => Math.random() - 0.5);
let msgIdx = 0;
const msgEl = document.getElementById('loadingMsg');
const stageEl = document.getElementById('loadingStage');

setInterval(() => {
  msgIdx = (msgIdx + 1) % shuffled.length;
  msgEl.style.opacity = '0';
  setTimeout(() => {
    msgEl.textContent = shuffled[msgIdx];
    msgEl.style.opacity = '1';
  }, 500);
}, 4500);

let stageIdx = 0;
function advanceStage() {
  if (stageIdx >= STAGES.length) return;
  const stage = STAGES[stageIdx];
  stageEl.textContent = stage.label;
  for (let i = 1; i < stage.seg; i++) {
    const prev = document.getElementById('seg' + i);
    prev.classList.remove('active');
    prev.classList.add('complete');
  }
  const curr = document.getElementById('seg' + stage.seg);
  curr.classList.add('active');
  stageIdx++;
  if (stageIdx < STAGES.length) {
    setTimeout(advanceStage, 8000 + Math.random() * 4000);
  }
}
setTimeout(() => advanceStage(), 6000);
</script>

</body>
